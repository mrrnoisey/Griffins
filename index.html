
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Official landing page for @griffoh_123 — a creative voice in music and style, with interactive animated background and easy follow action.">
<meta name="theme-color" content="#050505">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='56' font-size='60' dominant-baseline='middle' text-anchor='middle'%3E%F0%9F%8E%AA%3C/text%3E%3C/svg%3E" type="image/svg+xml">
<title>@griffoh_123</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #050505;
    color: white;
    overflow: hidden;
    cursor: none;
}

/* CANVAS BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -2;
}

/* CONTAINER */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    animation: fadeIn 2s ease-in-out;
}

/* PROFILE */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 20px;
    position: relative;
}

.profile img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

.profile::before {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: linear-gradient(45deg, #00f7ff, #ff00ff, #00f7ff);
    filter: blur(12px);
    animation: spin 6s linear infinite;
    z-index: -1;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* TEXT */
h1 {
    font-size: 2.5rem;
}

.bio {
    margin-top: 15px;
    opacity: 0.8;
    font-size: 0.95rem;
    line-height: 1.4;
    white-space: pre-line;
}

/* BUTTON */
.follow-btn {
    margin-top: 25px;
    padding: 14px 35px;
    border-radius: 30px;
    background: #111;
    color: white;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.follow-btn::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    left: -100%;
    background: linear-gradient(120deg, transparent, #00f7ff, transparent);
    animation: glow 3s linear infinite;
}

.follow-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #00f7ff;
}

@keyframes glow {
    100% { left: 100%; }
}

/* CURSOR TRAIL */
.trail {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    background: #00f7ff;
    box-shadow: 0 0 10px #00f7ff;
    z-index: 999;
}

/* CLICK RIPPLE */
.ripple {
    position: fixed;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    border: 2px solid #00f7ff;
    animation: ripple 0.6s linear;
}

@keyframes ripple {
    from {
        width: 0;
        height: 0;
        opacity: 1;
    }
    to {
        width: 200px;
        height: 200px;
        opacity: 0;
    }
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

    <div class="profile">
        <img src="your-image.jpg" alt="Profile of @griffoh_123" onerror="this.src='https://via.placeholder.com/120?text=Griffoh'">
    </div>

    <h1>@griffoh_123</h1>

    <div class="bio">
@xt.sall 🫀
vybez kartel.
self love
      griffoh
    </div>

    <button class="follow-btn" type="button" aria-label="Follow @griffoh_123 on Instagram" onclick="follow()">FOLLOW</button>

</div>

<noscript>
    <div style="text-align:center; padding: 1rem; background: rgba(0,0,0,.75); color: #fff; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;">
        JavaScript is disabled. For full interactive experience, enable JavaScript or follow <a href="https://instagram.com/griffoh_123" target="_blank" rel="noopener" style="color:#00f7ff;">@griffoh_123</a>.
    </div>
</noscript>

<script>
/* FOLLOW */
function follow() {
    window.open("https://instagram.com/griffoh_123", "_blank");
}

/* 3D BACKGROUND (PARALLAX PARTICLES) */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * 2,
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.y += p.z;

        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }

        let size = p.z * 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    requestAnimationFrame(draw);
}
draw();

/* CURSOR TRAIL */
document.addEventListener("mousemove", e => {
    const t = document.createElement("div");
    t.className = "trail";
    t.style.left = e.clientX + "px";
    t.style.top = e.clientY + "px";
    document.body.appendChild(t);

    setTimeout(() => t.remove(), 200);
});

/* CLICK RIPPLE */
document.addEventListener("click", e => {
    const ripple = document.createElement("div");
    ripple.className = "ripple";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    document.body.appendChild(ripple);

    setTimeout(() => ripple.remove(), 600);
});
</script>

</body>
</html>
